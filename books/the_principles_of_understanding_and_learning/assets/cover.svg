<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200">
<rect width="800" height="1200" fill="#f1ece2"/>
<rect x="52" y="52" width="696" height="1096" fill="none" stroke="#cfc6b5" stroke-width="1.5"/>

<!-- 작은 마크: 작업공간 → 세 과정 → 장기기억 -->
<g fill="none" stroke="#8a5a2b" stroke-width="2">
  <circle cx="130" cy="170" r="20"/>
  <circle cx="208" cy="170" r="40"/>
  <line x1="150" y1="156" x2="168" y2="148"/>
  <line x1="150" y1="170" x2="168" y2="170"/>
  <line x1="150" y1="184" x2="168" y2="192"/>
</g>
<g fill="#8a5a2b">
  <circle cx="130" cy="170" r="2.6"/>
  <circle cx="168" cy="148" r="2.6"/>
  <circle cx="168" cy="170" r="2.6"/>
  <circle cx="168" cy="192" r="2.6"/>
</g>

<!-- 제목 (좌측 정렬, 3줄) -->
<g font-family="Noto Serif CJK KR" font-weight="700" font-size="62" fill="#2a251f">
  <text x="110" y="330">The Principles</text>
  <text x="110" y="404">of Understanding</text>
  <text x="110" y="478">and Learning</text>
</g>

<!-- 하단: 규칙선 + 저자 -->
<line x1="110" y1="1034" x2="164" y2="1034" stroke="#8a5a2b" stroke-width="2"/>
<text x="110" y="1086" font-family="Noto Sans CJK KR" font-size="27" fill="#7a7163" letter-spacing="2">Jiwon Jung</text>
</svg>