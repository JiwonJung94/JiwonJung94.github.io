<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>…</title>
  <script>window.__404__ = {{ data | safe }};</script>
  <script>
  (function () {
    var books = (window.__404__ && window.__404__.books) || [];
    var parts = location.pathname.split("/").filter(Boolean);
    var bi = -1, book = null;
    for (var i = 0; i < parts.length && !book; i++) {
      for (var j = 0; j < books.length; j++) {
        if (books[j].id === parts[i]) { bi = i; book = books[j]; break; }
      }
    }
    function go(u) { location.replace(u === location.pathname ? "/home/" : u); }
    if (book) {
      var base = "/" + parts.slice(0, bi).join("/");
      base = base === "/" ? "/" : base + "/";
      var locale = parts[bi + 1] || "";
      var slug = (parts[bi + 2] || "").replace(/\.html$/, "");
      if (slug && book.slugs.indexOf(slug) >= 0) {

        var loc = book.locales.indexOf(locale) >= 0 ? locale : book["default"];
        go(base + book.id + "/" + loc + "/" + slug + ".html");
      } else {

        go(base + book.id + "/");
      }
    } else {
      go("/home/");
    }
  })();
  </script>
</head>
<body>리다이렉트 중… <a href="/home/">홈으로</a></body>
</html>
